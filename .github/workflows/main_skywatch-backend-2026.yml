# Docs for the Azure Web Apps Deploy action: https://github.com/azure/functions-action
# More GitHub Actions for Azure: https://github.com/Azure/actions
# More info on Python, GitHub Actions, and Azure Functions: https://aka.ms/python-webapps-actions

name: Deploy Python Backend to Azure

on:
  push:
    branches:
      - main
    # OPTIMIZATION: Only run this backend deployment if files in the backend folder change!
    paths:
      - 'SmartCanopyCloud/**' 
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_PACKAGE_PATH: './SmartCanopyCloud' 
  PYTHON_VERSION: '3.11' 

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Required for secure Azure login
      contents: read  # Required to checkout the code

    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v4

      - name: 2. Setup Python version
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 3. Install Dependencies directly into target folder
        # Using working-directory is much safer than manual 'cd' commands
        working-directory: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
        run: |
          pip install -r requirements.txt --target=".python_packages/lib/site-packages"

      - name: 4. Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_4AFE502FDC5946FBA7A7CEE71DF085E7 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_9132CA26506D4A1B8F5A99CFA5C4F68B }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_CD87AF337A65492A88688647444375B5 }}

      - name: 5. Deploy directly to Azure Functions
        uses: Azure/functions-action@v1
        id: deploy-to-function
        with:
          app-name: 'skywatch-backend-2026'
          slot-name: 'Production'
          # This tells Azure to package and deploy ONLY this subfolder, automatically fixing the root path issue!
          package: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
